name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # CPU-only install: no [gpu] (cupy) and no [ml] (torch) extras.
      # This is the canonical clean-clone path and proves the package
      # installs and the suite runs without any GPU/DL stack present.
      # The dashboard extra (pandas/plotly/streamlit) is required because the
      # dashboard tests import pandas at module load; without it a clean venv
      # fails at collection even though the dev extra alone "passes" locally
      # when those packages happen to be globally installed.
      - name: Install (CPU-only, dev + dashboard extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      - name: Import check (no cupy / no torch)
        run: python -c "import braid; print('braid', braid.__version__)"

      - name: Lint (ruff)
        run: ruff check braid/

      # Coverage gate is a ratchet: it currently encodes the existing floor
      # (~55% total) to block regressions. Raise --cov-fail-under as the
      # orchestration core (pipeline.py, cli.py, commands/) gains tests.
      - name: Tests + coverage gate
        run: |
          pytest tests/ -q \
            --cov=braid --cov-report=term-missing \
            --cov-fail-under=50

  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
